<!DOCTYPE HTML>
<html lang="fr">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<title>Nouveau prestataire - Un mariage heureux</title>
	<meta name="description" content="Soumettez votre demande d'inscription a l'annuaire Un Mariage Heureux pour proposer vos prestations mariage." />
	<meta name="robots" content="noindex,follow" />
	<link rel="canonical" href="https://www.unmariageheureux.com/nouveau-prestataire.html" />
	<meta property="og:type" content="website" />
	<meta property="og:title" content="Nouveau prestataire | Un Mariage Heureux" />
	<meta property="og:description" content="Soumettez votre demande d'inscription a l'annuaire Un Mariage Heureux pour proposer vos prestations mariage." />
	<meta property="og:url" content="https://www.unmariageheureux.com/nouveau-prestataire.html" />
	<meta property="og:image" content="https://www.unmariageheureux.com/images/logo.png" />
	<meta name="twitter:card" content="summary_large_image" />
	<link rel="stylesheet" href="assets/css/form-prestataire.css" />
</head>
<body>
	<main class="page">
		<header class="page-header">
			<h1>Formulaire nouveau prestataire</h1>
			<p>Remplissez les champs pour soumettre votre demande d'inscription à l'annuaire. Chaque demande est étudiée et doit être validée par l'équipe Un Mariage Heureux avant toute publication.</p>
			<p><a href="index.html">Retour au site</a></p>
		</header>

		<section class="card">
			<form id="prestataire-form" novalidate>
				<div class="grid">
					<label><span class="label-title required-label">Nom commercial</span>
						<input type="text" id="nomCommercial" required />
					</label>
					<label><span class="label-title required-label">Numéro Siret</span>
						<input type="text" id="numeroSiret" inputmode="numeric" pattern="[0-9]{14}" maxlength="14" placeholder="14 chiffres" required />
						<small class="field-note">Le numéro SIRET n'est pas affiché publiquement. Il sert uniquement à vérifier la légalité du prestataire.</small>
					</label>
					<label><span class="label-title">Numéro de tél</span>
						<input type="text" id="numeroDeTel" />
					</label>
					<label><span class="label-title required-label">Email</span>
						<input type="email" id="email" required />
					</label>
					<label><span class="label-title required-label">Type(s) de prestation</span>
						<select id="typeDePrestation" multiple size="6" required></select>
					</label>
					<label><span class="label-title required-label">Départements couverts</span>
						<input type="text" id="departementsCouverts" placeholder="Ex: 74, 73, 38, 2A, ALL" required />
						<small class="field-note">Utilisez <strong>ALL</strong> pour indiquer une couverture France entière.</small>
					</label>
					<label><span class="label-title">Site web</span>
						<input type="url" id="siteWeb" placeholder="https://..." />
					</label>
					<label><span class="label-title required-label">Instagram</span>
						<input
							type="text"
							id="instagram"
							placeholder="@moncompte"
							pattern="@[A-Za-z0-9._]{1,30}"
							title="Saisissez uniquement le nom du compte Instagram au format @moncompte, sans URL."
							autocomplete="off"
							required
						/>
						<small class="field-note">Format attendu : <strong>@moncompte</strong>. Les liens Instagram complets ne sont pas acceptes.</small>
					</label>
					<label><span class="label-title">Facebook</span>
						<input type="text" id="facebook" placeholder="@moncompte ou https://..." />
					</label>
					<label><span class="label-title">TikTok</span>
						<input type="text" id="tiktok" placeholder="@moncompte ou https://..." />
					</label>
					<label><span class="label-title">Photo</span>
						<input type="file" id="photoFile" accept="image/jpeg,image/png,image/webp" />
						<small class="field-note">Image JPG, PNG ou WebP, 5 Mo maximum. Elle sera vérifiée avant publication et pourra être refusée si elle ne respecte pas la qualité attendue.</small>
					</label>
				</div>

				<label><span class="label-title required-label">Description des prestations proposées</span>
					<textarea id="descriptionDesPrestationsProposees" rows="4" required></textarea>
				</label>

				<div class="checks">
					<label>
						<input type="checkbox" id="cgAcceptee" required />
						<span class="label-title required-label">J'accepte les <a href="conditions-generales-prestataires.html" target="_blank" rel="noopener">conditions générales</a> et je comprends que ma demande reste soumise à validation avant affichage.</span>
					</label>
				</div>

				<div class="captcha-block" aria-live="polite">
					<label for="captchaAnswer">
						<span class="label-title required-label">Vérification anti-spam</span>
						<span id="captchaQuestion" class="captcha-question"></span>
						<input type="text" id="captchaAnswer" inputmode="numeric" autocomplete="off" required />
						<small class="field-note">Renseignez le résultat pour confirmer l'envoi du formulaire.</small>
					</label>
					<button type="button" id="captchaRefresh" class="button-secondary">Changer la question</button>
				</div>

				<div class="honeypot-field" aria-hidden="true">
					<label for="website">
						<span class="label-title">Ne pas remplir ce champ</span>
						<input type="text" id="website" name="website" tabindex="-1" autocomplete="off" />
					</label>
				</div>

				<div class="actions">
					<button type="submit">Envoyer</button>
				</div>
			</form>
			<p id="submit-status" class="hint"></p>
		</section>
	</main>

	<script src="assets/js/umh-config.js"></script>
	<script src="assets/js/form-prestataire.js"></script>
</body>
</html>
