<!DOCTYPE HTML>
<html lang="fr">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<title>Nouveau prestataire - Un mariage heureux</title>
	<link rel="stylesheet" href="assets/css/form-prestataire.css" />
</head>
<body>
	<main class="page">
		<header class="page-header">
			<h1>Formulaire nouveau prestataire</h1>
			<p>Remplissez les champs pour soumettre votre demande d'inscription a l'annuaire. Chaque demande est etudiee et doit etre validee par l'equipe Un Mariage Heureux avant toute publication.</p>
			<p><a href="index.html">Retour au site</a></p>
		</header>

		<section class="card">
			<form id="prestataire-form" novalidate>
				<div class="grid">
					<label><span class="label-title required-label">Nom commercial</span>
						<input type="text" id="nomCommercial" required />
					</label>
					<label><span class="label-title required-label">Numero Siret</span>
						<input type="text" id="numeroSiret" inputmode="numeric" pattern="[0-9]{14}" maxlength="14" placeholder="14 chiffres" required />
						<small class="field-note">Le numero SIRET n'est pas affiche publiquement. Il sert uniquement a verifier la legalite du prestataire.</small>
					</label>
					<label><span class="label-title">Numero de tel</span>
						<input type="text" id="numeroDeTel" />
					</label>
					<label><span class="label-title required-label">Email</span>
						<input type="email" id="email" required />
					</label>
					<label><span class="label-title required-label">Type(s) de prestation</span>
						<select id="typeDePrestation" multiple size="6" required></select>
					</label>
					<label><span class="label-title">Ajouter un type personnalise (optionnel)</span>
						<input type="text" id="typeCustom" placeholder="Ex: Animation enfants" />
					</label>
					<label><span class="label-title required-label">Departements couverts</span>
						<input type="text" id="departementsCouverts" placeholder="Ex: 74, 73, 38, 2A, ALL" required />
						<small class="field-note">Utilisez <strong>ALL</strong> pour indiquer une couverture France entiere.</small>
					</label>
					<label><span class="label-title">Site web</span>
						<input type="url" id="siteWeb" placeholder="https://..." />
					</label>
					<label><span class="label-title required-label">Instagram</span>
						<input type="text" id="instagram" placeholder="@moncompte ou https://..." required />
					</label>
					<label><span class="label-title">Facebook</span>
						<input type="text" id="facebook" placeholder="@moncompte ou https://..." />
					</label>
					<label><span class="label-title">TikTok</span>
						<input type="text" id="tiktok" placeholder="@moncompte ou https://..." />
					</label>
					<label><span class="label-title">Photo</span>
						<input type="file" id="photoFile" accept="image/jpeg,image/png,image/webp" />
						<small class="field-note">Image JPG, PNG ou WebP, 5 Mo maximum. Elle sera verifiee avant publication et pourra etre refusee si elle ne respecte pas la qualite attendue.</small>
					</label>
				</div>

				<label><span class="label-title required-label">Description des prestations proposees</span>
					<textarea id="descriptionDesPrestationsProposees" rows="4" required></textarea>
				</label>

				<div class="checks">
					<label>
						<input type="checkbox" id="cgAcceptee" required />
						<span class="label-title required-label">J'accepte les <a href="conditions-generales-prestataires.html" target="_blank" rel="noopener">conditions generales</a> et je comprends que ma demande reste soumise a validation avant affichage.</span>
					</label>
				</div>

				<div class="actions">
					<button type="submit">Envoyer</button>
				</div>
			</form>
			<p id="submit-status" class="hint"></p>
		</section>
	</main>

	<script src="assets/js/umh-config.js"></script>
	<script src="assets/js/form-prestataire.js"></script>
</body>
</html>
